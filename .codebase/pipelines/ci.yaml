# Codebase CI for code.byted.org/obric/no-mistakes.
#
# This is the CI that actually runs on Codebase. `.github/workflows/` still
# exists and still runs on the GitHub mirror (`github` / `upstream` remotes),
# where release-please, GitHub Releases and GitHub Pages continue to live --
# those are GitHub-only and are deliberately NOT migrated here.
#
# Every job below surfaces on the MR as a check run named
# `[Pipeline] MR CI - <job name>`, which is what `bytedcli codebase mr status`
# reports and therefore what no-mistakes' `ci` step reads.
#
# Known gap, on purpose: the GitHub `test` job is an ubuntu/macos/windows
# matrix; this one is Linux-only. Codebase has macOS/Windows runners but we
# have not verified them, so Windows- and macOS-specific regressions (the
# `internal/winproc` console-hardening path, macOS symlink path resolution)
# are NOT covered here. They are still covered on the GitHub mirror.

name: MR CI

trigger:
  change:
    branches: [main]
    types: [create, push]

jobs:
  check:
    name: Format & Vet
    image: hub.byted.org/codebase/ci_go_1_25
    steps:
      - name: Format check
        commands:
          - |
            set -eu
            output=$(gofmt -l .)
            if [ -n "$output" ]; then
              echo "Files not formatted:"
              echo "$output"
              exit 1
            fi
      - name: Vet
        commands:
          - go vet ./...

  test:
    name: Test & Build (linux)
    image: hub.byted.org/codebase/ci_go_1_25
    timeout: 25
    steps:
      - name: Test
        commands:
          - go test -race ./...
      - name: Build
        commands:
          - go build ./cmd/no-mistakes

  e2e:
    name: End-to-end suite
    image: hub.byted.org/codebase/ci_go_1_25
    timeout: 30
    steps:
      # `make e2e` == go test -tags=e2e ./internal/e2e/... ./internal/pipeline/steps/...
      # It drives the real binary against a recorded fake agent, so it needs no
      # network and no API quota. Linux-only by design (see Makefile / ci.yml).
      - name: End-to-end suite
        commands:
          - make e2e

  guard_generated:
    name: Generated files must not be hand-edited
    image: hub.byted.org/codebase/ci_go_1_25
    steps:
      # CHANGELOG.md and .release-please-manifest.json are generated by
      # release-please from conventional commits, which still runs on the GitHub
      # mirror. A release commit reaching Codebase main therefore arrives through
      # sync, not through a hand-written MR -- but if it ever does come through an
      # MR, its title is release-please's `chore(main): release <version>`, which
      # is the one exemption below (the GitHub job exempts by bot author instead;
      # Codebase has no equivalent bot identity here).
      - name: Check MR does not modify release-please-generated files
        commands:
          - |
            set -eu

            title="${{Event.Change.Title}}"
            case "$title" in
              "chore(main): release"*)
                echo "release-please MR, exempt."
                exit 0
                ;;
            esac

            target="${{Event.Change.Target.Branch}}"

            # The auto-checkout may be shallow; `base...HEAD` needs a real merge
            # base, so deepen before diffing.
            if [ -f "$(git rev-parse --git-dir)/shallow" ]; then
              git fetch --unshallow origin || git fetch --deepen=1000 origin || true
            fi
            git fetch --no-tags origin "+refs/heads/${target}:refs/remotes/origin/${target}"

            files=$(git diff --name-only "origin/${target}...HEAD")

            violated=""
            for path in CHANGELOG.md .release-please-manifest.json; do
              if printf '%s\n' "$files" | grep -qxF -- "$path"; then
                violated="${violated} ${path}"
              fi
            done

            if [ -n "$violated" ]; then
              echo "This MR modifies release-please-generated files:${violated}"
              echo
              echo "CHANGELOG.md and .release-please-manifest.json are auto-generated by"
              echo "release-please from conventional commits. Do not hand-edit them."
              echo
              echo "If you want your change to appear in the next release notes, use a"
              echo "conventional commit message (feat/fix/docs/...)."
              exit 1
            fi

            echo "No release-please-generated files modified. OK."

  docs:
    name: Docs build
    image: hub.byted.org/codebase/ci_nodejs_20:latest
    timeout: 15
    # Build only. The GitHub Pages deploy half of `.github/workflows/docs.yml`
    # stays on GitHub -- Pages is a GitHub-only product.
    steps:
      - name: Install
        commands:
          - cd docs && npm ci
      - name: Build
        commands:
          - cd docs && npm run build
